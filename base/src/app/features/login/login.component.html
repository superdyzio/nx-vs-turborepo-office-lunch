<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">OfficeLunch</h1>

    <form (ngSubmit)="onLogin()">
      <app-input
        label="Username"
        type="text"
        placeholder="Enter username"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
        name="username"
      />

      <app-input
        label="Password"
        type="password"
        placeholder="Enter password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
      />

      @if (errorMessage()) {
        <p class="login-error" role="alert">{{ errorMessage() }}</p>
      }

      <app-button
        label="Sign In"
        variant="primary"
      />
    </form>
  </div>
</div>
